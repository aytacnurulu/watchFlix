<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Categories | WatchFlix</title>

    <link rel="stylesheet" href="../src/styles/global/main.css" />
    <link rel="stylesheet" href="../src/styles/pages/admin/categories.css" />
  </head>
  <body class="admin-layout">
    <aside class="admin-sidebar">
      <div class="admin-sidebar__brand">
        <a class="admin-sidebar__brand-link" href="./dashboard.html">
          <img
            class="admin-sidebar__logo"
            src="../assets/img/logo.svg"
            alt="WatchFlix logo"
          />
          <span class="admin-sidebar__brand-text">WatchFlix</span>
        </a>
      </div>

      <nav class="admin-sidebar__nav" aria-label="Admin navigation">
        <a class="admin-sidebar__item" href="./dashboard.html">
          <i class="fa-solid fa-table-cells-large" aria-hidden="true"></i>
          <span>Dashboard</span>
        </a>

        <a class="admin-sidebar__item" href="./movies.html">
          <i class="fa-solid fa-film" aria-hidden="true"></i>
          <span>Movies</span>
        </a>

        <a class="admin-sidebar__item admin-sidebar__item--active" href="./categories.html">
          <i class="fa-solid fa-layer-group" aria-hidden="true"></i>
          <span>Categories</span>
        </a>

        <a class="admin-sidebar__item" href="./actors.html">
          <i class="fa-solid fa-user-group" aria-hidden="true"></i>
          <span>Actors</span>
        </a>

        <a class="admin-sidebar__item" href="./users.html">
          <i class="fa-solid fa-users" aria-hidden="true"></i>
          <span>Users</span>
        </a>

        <a class="admin-sidebar__item" href="./comments.html">
          <i class="fa-regular fa-message" aria-hidden="true"></i>
          <span>Comments</span>
        </a>

        <a class="admin-sidebar__item" href="./contactUs.html">
          <i class="fa-regular fa-comment-dots" aria-hidden="true"></i>
          <span>Contact us</span>
        </a>

        <a class="admin-sidebar__item admin-sidebar__item--logout" href="./login.html">
          <i class="fa-solid fa-right-from-bracket" aria-hidden="true"></i>
          <span>Logout</span>
        </a>
      </nav>
    </aside>

    <div class="admin-main">
      <header class="admin-topbar">
        <div class="admin-topbar__title-box">
          <p class="admin-topbar__hello">Hi Admin</p>
          <h1 class="admin-topbar__title">Categories</h1>
        </div>

        <div class="admin-topbar__actions">
          <button
            class="admin-topbar__create-btn"
            type="button"
            data-bs-toggle="modal"
            data-bs-target="#categoryModal"
          >
            Create
          </button>

          <div class="admin-topbar__profile">
            <img
              class="admin-topbar__profile-img"
              src="../assets/img/profile.png"
              alt="Admin profile"
            />
            <span class="admin-topbar__profile-name">Admin</span>
          </div>
        </div>
      </header>

      <main class="categories-page">
        <section class="categories-table-wrap">
          <table class="categories-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Actions</th>
              </tr>
            </thead>

            <tbody>
              <tr>
                <td>1</td>
                <td>Action</td>
                <td>
                  <div class="categories-table__actions">
                    <button
                      type="button"
                      class="table-action-btn table-action-btn--edit"
                      data-bs-toggle="modal"
                      data-bs-target="#categoryModal"
                    >
                      <i class="fa-regular fa-pen-to-square" aria-hidden="true"></i>
                    </button>

                    <button
                      type="button"
                      class="table-action-btn table-action-btn--delete"
                      data-bs-toggle="modal"
                      data-bs-target="#deleteCategoryModal"
                    >
                      <i class="fa-solid fa-trash" aria-hidden="true"></i>
                    </button>
                  </div>
                </td>
              </tr>

              <tr>
                <td>2</td>
                <td>Drama</td>
                <td>
                  <div class="categories-table__actions">
                    <button
                      type="button"
                      class="table-action-btn table-action-btn--edit"
                      data-bs-toggle="modal"
                      data-bs-target="#categoryModal"
                    >
                      <i class="fa-regular fa-pen-to-square" aria-hidden="true"></i>
                    </button>

                    <button
                      type="button"
                      class="table-action-btn table-action-btn--delete"
                      data-bs-toggle="modal"
                      data-bs-target="#deleteCategoryModal"
                    >
                      <i class="fa-solid fa-trash" aria-hidden="true"></i>
                    </button>
                  </div>
                </td>
              </tr>

              <tr>
                <td>3</td>
                <td>Comedy</td>
                <td>
                  <div class="categories-table__actions">
                    <button
                      type="button"
                      class="table-action-btn table-action-btn--edit"
                      data-bs-toggle="modal"
                      data-bs-target="#categoryModal"
                    >
                      <i class="fa-regular fa-pen-to-square" aria-hidden="true"></i>
                    </button>

                    <button
                      type="button"
                      class="table-action-btn table-action-btn--delete"
                      data-bs-toggle="modal"
                      data-bs-target="#deleteCategoryModal"
                    >
                      <i class="fa-solid fa-trash" aria-hidden="true"></i>
                    </button>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </section>

        <div
          class="modal fade categories-modal"
          id="categoryModal"
          tabindex="-1"
          aria-labelledby="categoryModalLabel"
          aria-hidden="true"
        >
          <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content categories-modal__content">
              <div class="categories-modal__body">
                <h2 class="categories-modal__title" id="categoryModalLabel">Create category</h2>

                <form class="categories-form">
                  <input
                    class="categories-form__input"
                    type="text"
                    name="category-name"
                    placeholder="Enter category name"
                    required
                  />

                  <button type="submit" class="categories-form__submit">
                    Submit
                  </button>
                </form>
              </div>
            </div>
          </div>
        </div>

        <div
          class="modal fade delete-modal"
          id="deleteCategoryModal"
          tabindex="-1"
          aria-labelledby="deleteCategoryModalLabel"
          aria-hidden="true"
        >
          <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content delete-modal__content">
              <div class="delete-modal__header">
                <h2 class="delete-modal__title" id="deleteCategoryModalLabel">Delete category</h2>
                <button
                  type="button"
                  class="btn-close delete-modal__close"
                  data-bs-dismiss="modal"
                  aria-label="Close"
                ></button>
              </div>

              <div class="delete-modal__body">
                <p>
                  Are you sure you want to delete
                  <strong id="deleteCategoryTitle">Action</strong>?
                </p>
              </div>

              <div class="delete-modal__footer">
                <button
                  type="button"
                  class="delete-modal__btn delete-modal__btn--cancel"
                  data-bs-dismiss="modal"
                >
                  Cancel
                </button>
                <button type="button" class="delete-modal__btn delete-modal__btn--delete">
                  Delete
                </button>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
