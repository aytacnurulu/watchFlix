<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Account</title>

    <link rel="stylesheet" href="../src/styles/global/main.css" />
    <link rel="stylesheet" href="../src/styles/pages/account.css" />
  </head>
  <body class="account-page">
    <div id="client-sidebar"></div>

    <main class="account">
      <div class="account__wrap">
        <div class="account__avatar">
          <img
            class="account__avatar-img"
            src="../assets/img/profileImg.jpg"
            alt="Profile image"
          />
        </div>

        <form class="account__form">
          <div class="field">
            <div class="auth-input-group">
              <img class="icon icon--left" src="../assets/icons/user.svg" alt="" />
              <input class="input account__input" type="url" placeholder="profile image url" />
              <span class="account__input-action">
                <i class="fa-regular fa-eye"></i>
              </span>
            </div>
          </div>

          <div class="field">
            <div class="auth-input-group">
              <img class="icon icon--left" src="../assets/icons/user.svg" alt="" />
              <input class="input account__input" type="text" placeholder="full name" />
              <span class="account__input-action">
                <i class="fa-regular fa-eye"></i>
              </span>
            </div>
          </div>

          <div class="field">
            <div class="auth-input-group">
              <img class="icon icon--left" src="../assets/icons/mail.svg" alt="" />
              <input
                class="input account__input"
                type="email"
                value="rahimlisarkhan@gmail.com"
                readonly
              />
            </div>
          </div>

          <div class="field">
            <div class="auth-input-group">
              <img class="icon icon--left" src="../assets/icons/lock.svg" alt="" />
              <input
                id="account-password"
                class="input account__input"
                type="password"
                placeholder="password"
              />
              <button
                type="button"
                class="icon-btn"
                aria-label="Toggle password"
                id="toggleAccountPass"
              >
                <span class="icon-eye-open"><i class="fa-solid fa-eye"></i></span>
                <span class="icon-eye-closed" hidden><i class="fa-solid fa-eye-slash"></i></span>
              </button>
            </div>
          </div>

          <button class="btn account__btn" type="submit">save</button>
        </form>
      </div>
    </main>

    <script src="../src/js/components/include-sidebar.js"></script>
    <script src="../src/js/utils/toggle.js"></script>
  </body>
</html>
